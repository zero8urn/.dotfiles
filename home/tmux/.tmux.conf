# Use zsh as default
set -g default-shell /bin/zsh
set -g default-command "/bin/zsh -l"
set -ga update-environment " PATH"

# Enable 256-color and true-color (24-bit) support in tmux
set -g default-terminal "screen-256color" # Set terminal type for 256-color support
set -ga terminal-overrides ",*256col*:Tc" # Override to enable true-color for compatible terminals

# General
set -g set-clipboard on         # Use system clipboard
set -g detach-on-destroy off    # Don't exit from tmux when closing a session
set -g escape-time 0            # Remove delay for exiting insert mode with ESC in Neovim
set -g history-limit 1000000    # Increase history size (from 2,000)
set -g mouse on                 # Enable mouse support
set -g status-interval 3        # Update the status bar every 3 seconds (default: 15 seconds)
set -g allow-passthrough on     # Allow programs in the pane to bypass tmux (e.g. for image preview)
set -g status-position bottom

# Set prefix key
unbind C-b              # Unbind the default prefix key
set -g prefix C-a   # Set new prefix key to Ctrl+A

# Refresh tmux config with r
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Split horizontally in CWD with \
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

# Split vertically in CWD with -
unbind \"
bind - split-window -v -c "#{pane_current_path}"


# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on # Automatically renumber windows when one is closed

# Style
gray_light="#D8DEE9"
gray_medium="#ABB2BF"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"

set -g status-position top
set -g status-left-length 100
set -g status-style "fg=${gray_light},bg=default"
set -g status-left "#[fg=${green_soft},bold] #S #[fg=${gray_light},nobold] | "
set -g status-right " #{cpu}   #{mem} "
set -g window-status-current-format "#[fg=${cyan_soft},bold]  #[underscore]#I:#W#[nounderscore]#{?window_zoomed_flag, 󰍋 ,}"
set -g window-status-format " #I:#W"
set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${green_soft}"

# Popup tools for AI-assisted workflows
bind-key g display-popup -E -w 92% -h 92% "zsh -lic 'lazygit'"
bind-key y display-popup -E -w 92% -h 92% "zsh -lic 'yazi'"
bind-key a display-popup -E -w 92% -h 92% "zsh -lic 'claude'"
bind-key d display-popup -E -w 92% -h 92% "zsh -lic 'command -v gh-dash >/dev/null && gh-dash || gh dash'"
bind-key s display-popup -E -w 92% -h 92% "zsh -lic 'sesh list -i | fzf --prompt=\"session> \" | xargs -r sesh connect'"
bind-key t display-popup -E -w 92% -h 92% "zsh -lic 'tv'"
bind-key p display-popup -E -w 92% -h 92% "zsh -lic 'gh pr status'"

# Better copy mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel